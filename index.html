<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Cobros - Hotel Copahue</title>
<link rel="stylesheet" href="https://cloudflare.com">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; padding: 2rem 1rem; }
  .container { max-width: 1200px; margin: 0 auto; }
  header { margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 2px solid #ddd; }
  h1 { font-size: 28px; font-weight: 500; color: #333; }
  .header-subtitle { font-size: 14px; color: #666; }
  .main-content { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
  .form-section, .table-section { background: white; border: 0.5px solid #ddd; border-radius: 8px; padding: 1.5rem; }
  h2 { font-size: 18px; font-weight: 500; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 8px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1rem; }
  .form-group { margin-bottom: 1rem; }
  label { display: block; font-size: 12px; font-weight: 500; color: #666; margin-bottom: 0.4rem; }
  input, textarea { width: 100%; padding: 0.6rem; border: 0.5px solid #ddd; border-radius: 8px; font-size: 14px; }
  textarea { min-height: 80px; resize: vertical; }
  .button-group { display: flex; gap: 8px; }
  button { flex: 1; padding: 0.65rem; border-radius: 8px; border: 0.5px solid #ddd; cursor: pointer; font-weight: 500; }
  button.primary { background: #378ADD; color: white; border: none; }
  button.primary:disabled { background: #ccc; }
  .records-list { max-height: 500px; overflow-y: auto; }
  .record-item { background: #f9f9f9; border: 0.5px solid #ddd; border-radius: 8px; padding: 1rem; margin-bottom: 10px; }
  .record-header { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
  .record-reserva { font-weight: 600; color: #333; }
  .record-monto { font-weight: 600; color: #378ADD; }
  .record-details { font-size: 13px; color: #555; line-height: 1.4; }
  @media (max-width: 900px) { .main-content { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Gestión de Cobros - Hotel Copahue</h1>
    <p class="header-subtitle">Sistema de registro sincronizado en tiempo real</p>
  </header>

  <div class="main-content">
    <!-- Formulario -->
    <div class="form-section">
      <h2>✏️ Registrar Cobro</h2>
      <form id="cobroForm">
        <div class="form-row">
          <div class="form-group">
            <label>Número de Reserva *</label>
            <input type="text" name="reserva" id="reserva" placeholder="00000" required>
          </div>
          <div class="form-group">
            <label>Monto ($) *</label>
            <input type="number" name="monto" id="monto" placeholder="100000" required>
          </div>
        </div>
        <div class="form-group">
          <label>Teléfono / Correo *</label>
          <input type="text" name="contacto" id="contacto" placeholder="Ej: +54 9 11..." required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Nombre</label>
            <input type="text" name="nombre" id="nombre">
          </div>
          <div class="form-group">
            <label>Apellido</label>
            <input type="text" name="apellido" id="apellido">
          </div>
        </div>
        <div class="form-group">
          <label>Comentario adicional</label>
          <textarea name="comentario" id="comentario"></textarea>
        </div>
        <div class="button-group">
          <button type="submit" class="primary" id="btnRegistrar">Registrar</button>
          <button type="reset">Limpiar</button>
        </div>
      </form>
    </div>

    <!-- Lista de Registros -->
    <div class="table-section">
      <h2>📋 Cobros Registrados</h2>
      <div class="records-list" id="recordsList">
        <p style="text-align:center; color:#999;">Cargando registros...</p>
      </div>
    </div>
  </div>
</div>

<script>
  const API_URL = 'https://sheetdb.io';
  const form = document.getElementById('cobroForm');
  const recordsList = document.getElementById('recordsList');
  const btnRegistrar = document.getElementById('btnRegistrar');

  // 1. CARGAR DATOS DESDE EL EXCEL
  async function cargarDatos() {
    try {
      const res = await fetch(API_URL);
      const data = await res.json();
      
      recordsList.innerHTML = '';
      if (data.length === 0) {
        recordsList.innerHTML = '<p style="text-align:center; color:#999;">No hay cobros registrados.</p>';
        return;
      }

      // Mostramos los últimos registros arriba (reverse)
      data.reverse().forEach(item => {
        recordsList.innerHTML += `
          <div class="record-item">
            <div class="record-header">
              <span class="record-reserva">#${item.reserva || '---'}</span>
              <span class="record-monto">$${item.monto || '0'}</span>
            </div>
            <div class="record-details">
              <strong>${item.nombre || ''} ${item.apellido || ''}</strong><br>
              <i class="fa-solid fa-phone"></i> ${item.contacto || 'Sin contacto'}<br>
              <small>${item.comentario || ''}</small>
            </div>
          </div>
        `;
      });
    } catch (e) {
      recordsList.innerHTML = '<p style="color:red;">Error al conectar con la base de datos.</p>';
    }
  }

  // 2. ENVIAR DATOS AL EXCEL
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    btnRegistrar.disabled = true;
    btnRegistrar.innerText = 'Guardando...';

    const nuevoCobro = {
      reserva: document.getElementById('reserva').value,
      monto: document.getElementById('monto').value,
      contacto: document.getElementById('contacto').value,
      nombre: document.getElementById('nombre').value,
      apellido: document.getElementById('apellido').value,
      comentario: document.getElementById('comentario').value
    };

    try {
      await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ data: [nuevoCobro] })
      });
      form.reset();
      alert('¡Cobro registrado con éxito!');
      cargarDatos(); // Recargar lista
    } catch (e) {
      alert('Error al guardar datos.');
    } finally {
      btnRegistrar.disabled = false;
      btnRegistrar.innerText = 'Registrar';
    }
  });

  // Cargar al abrir la página
  window.onload = cargarDatos;
</script>

</body>
</html>
