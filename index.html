<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Cobros - Hotel Copahue</title>
<link rel="stylesheet" href="https://cloudflare.com">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  /* Fondo con degradado de verde mucho más oscuro */
  body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
    background: linear-gradient(135deg, #022c22 0%, #064e3b 100%); 
    min-height: 100vh;
    padding: 2rem 1rem; 
  }
  
  .container { max-width: 1200px; margin: 0 auto; }
  
  header { margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 2px solid rgba(255, 255, 255, 0.2); }
  h1 { font-size: 28px; font-weight: 500; color: #ffffff; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }
  
  .main-content { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
  .form-section, .table-section { background: white; color: #333; border-radius: 8px; padding: 1.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
  
  .form-row { display: flex; gap: 1rem; }
  .form-row .form-group { flex: 1; }
  
  .form-group { margin-bottom: 1rem; }
  label { display: block; font-size: 12px; color: #666; margin-bottom: 0.4rem; font-weight: bold; }
  
  /* Recuadros de datos con fondo gris medio-oscuro */
  input, textarea { 
    width: 100%; 
    padding: 0.6rem; 
    border: 1px solid #444; 
    border-radius: 8px; 
    font-size: 14px; 
    outline-color: #10b981;
    background-color: #52525b; /* Gris medio-oscuro */
    color: #ffffff; /* Texto en blanco para contraste */
  }
  
  /* Color del texto indicatorio (placeholder) para que se lea bien sobre gris oscuro */
  input::placeholder, textarea::placeholder {
    color: #d1d5db; 
  }

  /* Estilo para campos deshabilitados (ej. al editar) sobre el tema oscuro */
  input:disabled { background-color: #3f3f46; cursor: not-allowed; opacity: 0.8; }
  
  .button-group { display: flex; gap: 8px; margin-top: 1.5rem; }
  button { flex: 1; padding: 0.65rem; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.2s ease; border: none; }
  button:hover { filter: brightness(0.9); transform: translateY(-1px); }
  
  button.primary { background: #059669; color: white; } 
  button.edit-mode { background: #064e3b; color: white; } 
  button[type="reset"] { background: #ecfdf5; color: #064e3b; border: 1px solid #10b981; } 
  button[type="reset"]:hover { background: #d1fae5; }
  
  .record-item { background: #f9f9f9; border: 1px solid #eee; border-radius: 8px; padding: 1rem; margin-bottom: 10px; transition: 0.2s; }
  .record-item:hover { border-color: #10b981; }
  .record-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; font-weight: bold; }
  
  .reserva-group { display: flex; align-items: center; gap: 8px; }
  
  .btn-editar { background: #10b981; color: white; padding: 0.2rem 0.6rem; font-size: 11px; border-radius: 4px; cursor: pointer; }
  
  @media (max-width: 900px) { .main-content { grid-template-columns: 1fr; } }
  @media (max-width: 500px) { .form-row { flex-direction: column; gap: 0; } }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Gestión de Cobros - Hotel Copahue</h1>
  </header>

  <div class="main-content">
    <div class="form-section">
      <h2 style="margin-bottom: 1rem; color: #064e3b;">✏️ Registrar Cobro</h2>
      <form id="cobroForm">
        
        <div class="form-row">
          <div class="form-group">
            <label>Reserva</label>
            <input type="text" id="reserva" placeholder="000000" required>
          </div>
          <div class="form-group">
            <label>Monto</label>
            <input type="text" id="monto" placeholder="$" required>
          </div>
        </div>

        <div class="form-group">
          <label>Contacto</label>
          <input type="text" id="contacto" placeholder="Correo o Whatsapp donde se encuentre la tarjeta" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Nombre</label>
            <input type="text" id="nombre" placeholder="De quien envió la tarjeta">
          </div>
          <div class="form-group">
            <label>Apellido</label>
            <input type="text" id="apellido" placeholder="De quien envió la tarjeta">
          </div>
        </div>

        <div class="form-group">
          <label>Comentario</label>
          <textarea id="comentario" rows="3" placeholder="Info adicional"></textarea>
        </div>

        <div class="button-group">
          <button type="submit" class="primary" id="btnRegistrar">Registrar</button>
          <button type="reset" id="btnLimpiar">Limpiar / Cancelar</button>
        </div>
      </form>
    </div>

    <div class="table-section">
      <h2 style="margin-bottom: 1rem; color: #064e3b;">📋 Cobros Registrados</h2>
      <div id="recordsList">Cargando...</div>
    </div>
  </div>
</div>

<script>
  const API_URL = 'https://sheetdb.io/api/v1/g5o4pfx1hc0ci';
  
  let cobrosCache = []; 
  let modoEdicion = false;
  let reservaEditando = null;

  async function cargarDatos() {
    const list = document.getElementById('recordsList');
    try {
      const res = await fetch(API_URL);
      if (!res.ok) throw new Error("Error " + res.status);
      
      const data = await res.json();
      cobrosCache = data; 
      list.innerHTML = '';
      
      if (!data || data.length === 0) {
        list.innerHTML = '<p style="text-align:center;color:#999;">El Excel está vacío.</p>';
        return;
      }
      
      [...data].reverse().forEach(item => {
        list.innerHTML += `
          <div class="record-item">
            <div class="record-header">
              <div class="reserva-group">
                <span>#${item.reserva}</span>
                <button class="btn-editar" onclick="iniciarEdicion('${item.reserva}')">✏️ Editar</button>
              </div>
              <span style="color: #059669;">$${item.monto}</span>
            </div>
            <div style="font-size:13px; color:#555;">
              <strong>${item.nombre} ${item.apellido}</strong><br>
              Contacto: ${item.contacto}<br>
              ${item.comentario ? `<em>Nota: ${item.comentario}</em>` : ''}
            </div>
          </div>`;
      });
    } catch (e) {
      list.innerHTML = `<p style="color:red;">⚠️ No se pudo conectar. Revisa la Fila 1 de tu Excel.</p>`;
    }
  }

  window.iniciarEdicion = function(reservaId) {
    const cobro = cobrosCache.find(c => c.reserva === reservaId);
    if (!cobro) return;

    document.getElementById('reserva').value = cobro.reserva;
    document.getElementById('monto').value = cobro.monto;
    document.getElementById('contacto').value = cobro.contacto;
    document.getElementById('nombre').value = cobro.nombre;
    document.getElementById('apellido').value = cobro.apellido;
    document.getElementById('comentario').value = cobro.comentario || '';

    modoEdicion = true;
    reservaEditando = reservaId; 
    
    const btn = document.getElementById('btnRegistrar');
    btn.innerText = 'Actualizar Cobro';
    btn.className = 'edit-mode';
    
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  document.getElementById('cobroForm').addEventListener('reset', () => {
    modoEdicion = false;
    reservaEditando = null;
    
    const btn = document.getElementById('btnRegistrar');
    btn.innerText = 'Registrar';
    btn.className = 'primary';
  });

  document.getElementById('cobroForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btnRegistrar');
    const textoOriginal = btn.innerText;
    
    btn.innerText = 'Guardando...';
    btn.disabled = true;
    
    const payload = {
      reserva: document.getElementById('reserva').value,
      monto: document.getElementById('monto').value,
      contacto: document.getElementById('contacto').value,
      nombre: document.getElementById('nombre').value,
      apellido: document.getElementById('apellido').value,
      comentario: document.getElementById('comentario').value
    };

    try {
      if (modoEdicion) {
        await fetch(`${API_URL}/reserva/${reservaEditando}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ data: payload })
        });
        alert('¡Cobro actualizado con éxito!');
      } else {
        await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ data: [payload] })
        });
        alert('¡Cobro registrado!');
      }
      
      document.getElementById('cobroForm').reset();
      cargarDatos();
      
    } catch (e) { 
      alert('Error al guardar. Por favor intente nuevamente.'); 
    } finally { 
      btn.innerText = textoOriginal; 
      btn.disabled = false; 
    }
  });

  window.onload = cargarDatos;
</script>
</body>
</html>
