<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Cobros - Hotel Copahue</title>
<link rel="stylesheet" href="https://cloudflare.com">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; padding: 2rem 1rem; }
  .container { max-width: 1200px; margin: 0 auto; }
  header { margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 2px solid #ddd; }
  h1 { font-size: 28px; font-weight: 500; color: #333; }
  .main-content { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
  .form-section, .table-section { background: white; border: 0.5px solid #ddd; border-radius: 8px; padding: 1.5rem; }
  .form-group { margin-bottom: 1rem; }
  label { display: block; font-size: 12px; color: #666; margin-bottom: 0.4rem; }
  input, textarea { width: 100%; padding: 0.6rem; border: 0.5px solid #ddd; border-radius: 8px; font-size: 14px; }
  .button-group { display: flex; gap: 8px; }
  button { flex: 1; padding: 0.65rem; border-radius: 8px; border: 0.5px solid #ddd; cursor: pointer; }
  button.primary { background: #378ADD; color: white; border: none; }
  .record-item { background: #f9f9f9; border: 0.5px solid #ddd; border-radius: 8px; padding: 1rem; margin-bottom: 10px; }
  .record-header { display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-weight: bold; }
  @media (max-width: 900px) { .main-content { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Gestión de Cobros - Hotel Copahue</h1>
  </header>

  <div class="main-content">
    <div class="form-section">
      <h2>✏️ Registrar Cobro</h2>
      <form id="cobroForm">
        <div class="form-group"><label>Reserva</label><input type="text" id="reserva" required></div>
        <div class="form-group"><label>Monto</label><input type="number" id="monto" required></div>
        <div class="form-group"><label>Contacto</label><input type="text" id="contacto" required></div>
        <div class="form-group"><label>Nombre</label><input type="text" id="nombre"></div>
        <div class="form-group"><label>Apellido</label><input type="text" id="apellido"></div>
        <div class="form-group"><label>Comentario</label><textarea id="comentario"></textarea></div>
        <div class="button-group">
          <button type="submit" class="primary" id="btnRegistrar">Registrar</button>
          <button type="reset">Limpiar</button>
        </div>
      </form>
    </div>

    <div class="table-section">
      <h2>📋 Cobros Registrados</h2>
      <div id="recordsList">Cargando...</div>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://sheetdb.io/api/v1/g5o4pfx1hc0ci';

  async function cargarDatos() {
    const list = document.getElementById('recordsList');
    try {
      const res = await fetch(API_URL);
      if (!res.ok) throw new Error("Error " + res.status);
      const data = await res.json();
      list.innerHTML = '';
      if (!data || data.length === 0) {
        list.innerHTML = '<p style="text-align:center;color:#999;">El Excel está vacío.</p>';
        return;
      }
      data.reverse().forEach(item => {
        list.innerHTML += `
          <div class="record-item">
            <div class="record-header"><span>#${item.reserva}</span><span>$${item.monto}</span></div>
            <div style="font-size:13px;">${item.nombre} ${item.apellido}<br>${item.contacto}</div>
          </div>`;
      });
    } catch (e) {
      list.innerHTML = `<p style="color:red;">⚠️ No se pudo conectar. Revisa la Fila 1 de tu Excel.</p>`;
    }
  }

  document.getElementById('cobroForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btnRegistrar');
    btn.innerText = 'Guardando...';
    btn.disabled = true;
    try {
      await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          data: [{
            reserva: document.getElementById('reserva').value,
            monto: document.getElementById('monto').value,
            contacto: document.getElementById('contacto').value,
            nombre: document.getElementById('nombre').value,
            apellido: document.getElementById('apellido').value,
            comentario: document.getElementById('comentario').value
          }]
        })
      });
      document.getElementById('cobroForm').reset();
      alert('¡Registrado!');
      cargarDatos();
    } catch (e) { alert('Error al guardar'); }
    finally { btn.innerText = 'Registrar'; btn.disabled = false; }
  });

  window.onload = cargarDatos;
</script>
</body>
</html>
